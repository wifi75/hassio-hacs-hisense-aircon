<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="none"/>

  <!-- Air Conditioner Unit Body -->
  <rect x="40" y="60" width="176" height="120" rx="12" fill="#1a1a1a" stroke="#3b82f6" stroke-width="2"/>

  <!-- Display/Control Panel -->
  <rect x="50" y="70" width="156" height="40" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>

  <!-- Temperature Display -->
  <text x="80" y="100" font-size="24" font-weight="bold" fill="#60a5fa" font-family="monospace">22°C</text>

  <!-- Control Buttons -->
  <circle cx="180" cy="85" r="8" fill="#3b82f6"/>
  <circle cx="210" cy="85" r="8" fill="#3b82f6"/>

  <!-- Vents/Air Flow Lines -->
  <g stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <!-- Left vent -->
    <line x1="60" y1="130" x2="60" y2="155"/>
    <line x1="68" y1="128" x2="68" y2="157"/>
    <line x1="76" y1="130" x2="76" y2="155"/>

    <!-- Center vent -->
    <line x1="120" y1="125" x2="120" y2="160"/>
    <line x1="128" y1="123" x2="128" y2="162"/>
    <line x1="136" y1="125" x2="136" y2="160"/>

    <!-- Right vent -->
    <line x1="180" y1="130" x2="180" y2="155"/>
    <line x1="188" y1="128" x2="188" y2="157"/>
    <line x1="196" y1="130" x2="196" y2="155"/>
  </g>

  <!-- Air Flow Animation Indicators -->
  <g fill="#3b82f6" opacity="0.6">
    <circle cx="60" cy="145" r="3"/>
    <circle cx="128" cy="142" r="3"/>
    <circle cx="188" cy="145" r="3"/>
  </g>

  <!-- Status Indicators -->
  <circle cx="55" cy="115" r="4" fill="#10b981"/>
  <circle cx="75" cy="115" r="4" fill="#3b82f6" opacity="0.5"/>

  <!-- Power Indicator -->
  <circle cx="220" cy="100" r="6" fill="#ef4444" opacity="0.8"/>

  <!-- Bottom Details (Power Cord Connection) -->
  <rect x="110" y="175" width="36" height="20" rx="2" fill="#3b82f6" opacity="0.3"/>
  <line x1="128" y1="195" x2="128" y2="220" stroke="#3b82f6" stroke-width="2"/>

  <!-- Decorative frame -->
  <rect x="38" y="58" width="180" height="124" rx="14" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
</svg>
